<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>VoiceCare — History</title>
<link rel="stylesheet" href="style.css"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
</head><body>
<div class="shell" id="root"></div>
<script src="core.js?v=20260516-lang4"></script>
<script>
const HIST=[
  {id:'h1',t:'9:00 AM', typeKey:'blood',      dr:'Dr. Lim Wei',    s:'upcoming'},
  {id:'h2',t:'10:30 AM',typeKey:'blood',      dr:'Dr. Lim Wei',    s:'completed'},
  {id:'h3',t:'2:00 PM', typeKey:'checkup',    dr:'Dr. Siti Nora',  s:'completed'},
  {id:'h4',t:'11:00 AM',typeKey:'xray',       dr:'Dr. Ahmad Faris',s:'completed'},
  {id:'h5',t:'9:30 AM', typeKey:'ecg',        dr:'Dr. Lim Wei',    s:'completed'},
  {id:'h6',t:'3:00 PM', typeKey:'specialist', dr:'Dr. Priya M.',   s:'cancelled'},
  {id:'h7',t:'10:00 AM',typeKey:'checkup',    dr:'Dr. Siti Nora',  s:'completed'},
];
function hType(h){ return VC.t(`historyData.types.${h.typeKey}`); }
function hDate(h){ return VC.t(`historyData.dates.${h.id}`); }
function ticon(type){
  if(type.includes('Blood')) return `<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 3 Q16 9 16 13 A4 4 0 0 1 8 13 Q8 9 12 3Z" fill="#F4C0D1" stroke="#D4537E" stroke-width="1.4" stroke-linejoin="round"/></svg>`;
  if(type.includes('X-Ray')||type.includes('Chest')) return `<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="4" y="3" width="16" height="18" rx="2" fill="#F4C0D1" stroke="#D4537E" stroke-width="1.4"/><ellipse cx="12" cy="11" rx="4" ry="5" fill="none" stroke="#D4537E" stroke-width="1.4"/><line x1="12" y1="6" x2="12" y2="16" stroke="#D4537E" stroke-width="1"/><line x1="8" y1="11" x2="16" y2="11" stroke="#D4537E" stroke-width="1"/></svg>`;
  if(type.includes('ECG')) return `<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="3" y="6" width="18" height="12" rx="2" fill="#F4C0D1" stroke="#D4537E" stroke-width="1.4"/><path d="M4 12 L7 12 L8.5 9 L10 15 L11.5 11 L13 13 L14.5 12 L20 12" fill="none" stroke="#D4537E" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  return `<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="9" r="4" fill="#F4C0D1" stroke="#D4537E" stroke-width="1.4"/><path d="M5 20 Q5 15 12 15 Q19 15 19 20" fill="none" stroke="#D4537E" stroke-width="1.4" stroke-linecap="round"/></svg>`;
}
function rdrList(filter){
  const data=filter==='all'?HIST:HIST.filter(h=>h.s===filter);
  const el=document.getElementById('hist-list'); if(!el)return;
  el.innerHTML=data.length?data.map(h=>`
  <div class="card hover" style="margin-bottom:9px;display:flex;align-items:center;gap:14px;">
    <div style="width:44px;height:44px;background:var(--p50);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">${ticon(hType(h))}</div>
    <div style="flex:1;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px;">
        <span style="font-size:14px;font-weight:500;color:var(--g900);" data-lang="historyData.types.${h.typeKey}">${hType(h)}</span>
        <span class="badge ${h.s==='completed'?'bg':h.s==='upcoming'?'bp':'bk'}" data-lang="status.${h.s}">${h.s}</span>
      </div>
      <div style="font-size:12px;color:var(--g500);"><span data-lang="historyData.dates.${h.id}">${hDate(h)}</span> <span data-lang="history.at">at</span> ${h.t} · ${h.dr}</div>
    </div>
    <div style="display:flex;gap:7px;flex-shrink:0;">
      ${h.s==='completed'?`<button class="btn" onclick="location.href='report.html'" style="font-size:12px;padding:6px 12px;" data-lang="history.viewReport">View report</button>`:''}
      ${h.s==='upcoming'?`<button class="btn pri" style="font-size:12px;padding:6px 12px;" onclick="VC.toast(VC.t('history.detailsShown'))" data-lang="history.details">Details</button>`:''}
    </div>
  </div>`).join(''):`<div style="text-align:center;padding:30px;color:var(--g500);font-size:14px;">${VC.tf('history.noAppointments',{filter:VC.t('status.'+filter)})}</div>`;
  VC._applyLang();
}
function setFilter(btn,f){
  document.querySelectorAll('.fb').forEach(b=>{b.className='btn fb';});
  btn.className='btn pri fb';
  rdrList(f);
  VC.bubble('ok',`${IC.check()} ${VC.tf('history.showing',{filter:VC.t('status.'+f)})}`,VC.t('history.filterHint'));
}
VC.flow={
  hint:()=>'"Upcoming", "Completed", "All" to filter appointments.',
  handle:async(text,lower)=>{
    if(/upcoming|next|future/.test(lower)){setFilter(document.querySelector('[data-f=upcoming]'),'upcoming');return;}
    if(/completed|done|past/.test(lower)){setFilter(document.querySelector('[data-f=completed]'),'completed');return;}
    if(/cancelled|canceled/.test(lower)){setFilter(document.querySelector('[data-f=cancelled]'),'cancelled');return;}
    if(/all|everything|show all/.test(lower)){setFilter(document.querySelector('[data-f=all]'),'all');return;}
    if(/book|new appointment/.test(lower)){VC.nav('book.html');return;}
    if(/report|result/.test(lower)){VC.nav('report.html');return;}
    VC.bubble('normal',VC.t('history.help'),'');
    setTimeout(()=>VC.startSR(),400);
  }
};
document.getElementById('root').innerHTML=buildShell('history.html')+`
<div class="page-content">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
    <div><p class="ptitle" data-lang="history.title">Appointment history</p><p class="psub" data-lang="history.subtitle">Say "Upcoming" or "Completed" to filter</p></div>
    <button class="btn pri" onclick="location.href='book.html'" data-lang="history.newAppointment">+ New appointment</button>
  </div>
  <div class="g3" style="margin-bottom:14px;">
    <div style="background:var(--p50);border-radius:var(--r-md);padding:14px;text-align:center;"><div style="font-size:28px;font-weight:600;color:var(--p400);">7</div><div style="font-size:12px;color:var(--g500);margin-top:2px;" data-lang="history.totalVisits">Total visits</div></div>
    <div style="background:var(--gbg);border-radius:var(--r-md);padding:14px;text-align:center;"><div style="font-size:28px;font-weight:600;color:var(--green);">1</div><div style="font-size:12px;color:var(--gdark);margin-top:2px;" data-lang="status.upcoming">Upcoming</div></div>
    <div style="background:var(--g100);border-radius:var(--r-md);padding:14px;text-align:center;"><div style="font-size:28px;font-weight:600;color:var(--g700);">5</div><div style="font-size:12px;color:var(--g500);margin-top:2px;" data-lang="status.completed">Completed</div></div>
  </div>
  <div style="display:flex;gap:6px;margin-bottom:14px;">
    <button class="btn pri fb" data-f="all"       onclick="setFilter(this,'all')" data-lang="status.all">All</button>
    <button class="btn fb"     data-f="upcoming"  onclick="setFilter(this,'upcoming')" data-lang="status.upcoming">Upcoming</button>
    <button class="btn fb"     data-f="completed" onclick="setFilter(this,'completed')" data-lang="status.completed">Completed</button>
    <button class="btn fb"     data-f="cancelled" onclick="setFilter(this,'cancelled')" data-lang="status.cancelled">Cancelled</button>
  </div>
  <div id="hist-list"></div>
</div>`;
rdrList('all');
VC.init('history.html');
</script>
<script src="Lana.js?v=20260516-text1"></script>
</body>
</html>
