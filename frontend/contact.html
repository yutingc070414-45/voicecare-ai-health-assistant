<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>VoiceCare — Contact</title>
<link rel="stylesheet" href="style.css"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
</head><body>
<div class="shell" id="root"></div>
<script src="core.js?v=20260516-lang4"></script>
<script>
let dictating=false;
VC.flow={
  hint:()=>'"Dictate" to speak a message, "Call us" for phone, "Email" for email address.',
  handle:async(text,lower)=>{
    if(/dictate|speak message|voice message/.test(lower)){startDictate();return;}
    if(/send|submit|send message/.test(lower)){doSend();return;}
    if(/clear|reset/.test(lower)){clearForm();VC.bubble('normal',VC.t('contact.msg.formCleared'),'');return;}
    if(/call|phone|telephone/.test(lower)){VC.bubble('normal',VC.t('contact.msg.phone'),'');VC.speak(VC.t('contact.speech.phone'),()=>setTimeout(()=>VC.startSR(),400));return;}
    if(/email|e-mail/.test(lower)){VC.bubble('normal',VC.t('contact.msg.email'),'');VC.speak(VC.t('contact.speech.email'),()=>setTimeout(()=>VC.startSR(),400));return;}
    if(/address|location|where/.test(lower)){VC.bubble('normal',VC.t('contact.msg.address'),'');VC.speak(VC.t('contact.speech.address'),()=>setTimeout(()=>VC.startSR(),400));return;}
    if(dictating){
      const ta=document.getElementById('f-msg');
      if(ta){ta.value+=(ta.value?' ':'')+text;ta.classList.add('done');}
      if(/done|finish|stop dictating|end/.test(lower)){dictating=false;VC.bubble('ok',`${IC.check()} ${VC.t('contact.msg.recorded')}`,'');}
      else{VC.bubble('ok',VC.tf('contact.msg.added',{text:VC.esc(text)}),'');setTimeout(()=>VC.startSR(),400);}
      return;
    }
    VC.bubble('normal',VC.t('contact.msg.help'),'');
    setTimeout(()=>VC.startSR(),400);
  }
};
function startDictate(){dictating=true;VC.bubble('normal',VC.t('contact.msg.dictationOn'),'');VC.speak(VC.t('contact.speech.dictationOn'),()=>setTimeout(()=>VC.startSR(),300));}

async function doSend() {
  const contactData = {
    name: document.getElementById("f-name")?.value || "",
    email: document.getElementById("f-email")?.value || "",
    subject: document.getElementById("f-subj")?.value || "",
    message: document.getElementById("f-msg")?.value || ""
  };

  if (
    !contactData.name ||
    !contactData.email ||
    !contactData.message
  ) {
    VC.bubble("err", "Please complete required fields.", "");
    return;
  }

  try {
    const response = await fetch(
      "http://127.0.0.1:8788/api/contact",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(contactData)
      }
    );

    const result = await response.json();

    VC.bubble(
      "ok",
      `${IC.check()} Message sent successfully.`,
      ""
    );

    VC.toast("Message saved");
    console.log(result);

    setTimeout(() => {
      ["f-name", "f-email", "f-msg"].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = "";
      });
    }, 1000);

  } catch (error) {
    console.error(error);

    VC.bubble(
      "err",
      "Backend connection failed.",
      ""
    );
  }
}

function clearForm(){['f-name','f-email','f-msg'].forEach(id=>{const el=document.getElementById(id);if(el){el.value='';el.classList.remove('done');}});}
document.getElementById('root').innerHTML=buildShell('contact.html')+`
<div class="page-content">
  <div style="margin-bottom:14px;"><p class="ptitle" data-lang="contact.title">Contact us</p><p class="psub" data-lang="contact.subtitle">Say "Call us", "Email", "Dictate" to speak a message, or "Send message"</p></div>
  <div class="g2" style="gap:16px;">
    <div style="display:flex;flex-direction:column;gap:10px;">
      <div class="card" style="display:flex;gap:12px;align-items:flex-start;">
        <div style="width:44px;height:44px;background:var(--p50);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" fill="#F4C0D1" stroke="#D4537E" stroke-width="1.4"/><circle cx="12" cy="9" r="2.5" fill="#D4537E"/></svg></div>
        <div><div style="font-size:13px;font-weight:500;color:var(--g900);margin-bottom:3px;" data-lang="contact.addressTitle">Address</div><p style="font-size:13px;color:var(--g700);line-height:1.65;margin:0 0 5px;" data-lang="contact.addressValue">voice care street<br/>voicecare, 00-000, world</p><span class="badge bp" data-lang="contact.sayAddress">Say: "Address"</span></div>
      </div>
      <div class="card" style="display:flex;gap:12px;align-items:flex-start;">
        <div style="width:44px;height:44px;background:var(--p50);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C9.6 21 3 14.4 3 6c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z" fill="#F4C0D1" stroke="#D4537E" stroke-width="1.2"/></svg></div>
        <div><div style="font-size:13px;font-weight:500;color:var(--g900);margin-bottom:3px;" data-lang="contact.phoneTitle">Phone</div><p style="font-size:14px;font-weight:500;color:var(--p600);margin:0 0 2px;">+00 000 000 000</p><p style="font-size:12px;color:var(--g500);margin:0 0 5px;" data-lang="contact.hoursShort">Mon–Fri 8am–6pm, Sat 9am–1pm</p><span class="badge bp" data-lang="contact.sayCall">Say: "Call us"</span></div>
      </div>
      <div class="card" style="display:flex;gap:12px;align-items:flex-start;">
        <div style="width:44px;height:44px;background:var(--p50);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="14" rx="3" fill="#F4C0D1" stroke="#D4537E" stroke-width="1.4"/><path d="M3 8 L12 14 L21 8" fill="none" stroke="#D4537E" stroke-width="1.4" stroke-linecap="round"/></svg></div>
        <div><div style="font-size:13px;font-weight:500;color:var(--g900);margin-bottom:3px;" data-lang="contact.emailTitle">Email</div><p style="font-size:14px;font-weight:500;color:var(--p600);margin:0 0 2px;">hello@voicecare.com</p><p style="font-size:12px;color:var(--g500);margin:0 0 5px;" data-lang="contact.replyTime">Reply within 1 business day</p><span class="badge bp" data-lang="contact.sayEmail">Say: "Email"</span></div>
      </div>
      <div style="background:var(--rbg);border:1px solid #F7C1C1;border-radius:var(--r-lg);padding:12px 14px;display:flex;align-items:center;gap:10px;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" fill="#F09595" stroke="#E24B4A" stroke-width="1.4"/><rect x="11" y="7" width="2" height="6" rx="1" fill="white"/><circle cx="12" cy="16" r="1" fill="white"/></svg>
        <div><div style="font-size:13px;font-weight:600;color:var(--red);" data-lang="contact.emergencyTitle">Medical emergency?</div><p style="font-size:13px;color:#791F1F;margin:0;" data-lang="contact.emergencyText">Call <strong>999</strong> immediately</p></div>
      </div>
    </div>
    <div class="card">
      <div class="sec" style="margin-bottom:12px;" data-lang="contact.sendMessage">Send a message</div>
      <div class="fg"><label><span data-lang="contact.yourName">Your name</span> <span style="color:var(--p400)">*</span></label><input type="text" id="f-name" placeholder="e.g. Sarah Ali" data-lang-placeholder="contact.placeholders.name"/></div>
      <div class="fg"><label><span data-lang="contact.emailTitle">Email</span> <span style="color:var(--p400)">*</span></label><input type="email" id="f-email" placeholder="e.g. sarah@email.com" data-lang-placeholder="contact.placeholders.email"/></div>
      <div class="fg"><label data-lang="contact.subject">Subject</label><select id="f-subj"><option data-lang="contact.subjects.general">General enquiry</option><option data-lang="contact.subjects.appointment">Appointment question</option><option data-lang="contact.subjects.report">Report query</option><option data-lang="contact.subjects.accessibility">Accessibility support</option><option data-lang="contact.subjects.feedback">Feedback</option></select></div>
      <div class="fg"><label><span data-lang="contact.message">Message</span> <span style="color:var(--p400)">*</span></label><textarea id="f-msg" rows="4" placeholder='Say "Dictate" to speak your message, or type here...' data-lang-placeholder="contact.placeholders.message"></textarea></div>
      <div style="background:var(--p50);border-radius:var(--r-sm);padding:8px 12px;margin-bottom:12px;font-size:12px;color:var(--p600);" data-lang="contact.dictateHint">Say <strong>"Dictate"</strong> to speak — AI will transcribe automatically.</div>
      <div style="display:flex;gap:8px;">
        <button class="btn pri" onclick="doSend()" data-lang="contact.sendMessage">Send message</button>
        <button class="btn" onclick="startDictate()">${IC.mic2()} <span data-lang="contact.dictate">Dictate</span></button>
        <button class="btn" onclick="clearForm()" data-lang="common.clear">Clear</button>
      </div>
    </div>
  </div>
</div>`;
VC.init('contact.html');
</script>
<script src="Lana.js?v=20260516-text1"></script>
</body>
</html>
